<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="blog/amaze/header::head-fragment"></head>
<body id="blog">
<div th:replace="blog/amaze/header::nav-fragment"></div>
<div th:replace="blog/amaze/header::header-fragment"></div>
<div class="am-g am-g-fixed blog-fixed page-shell links-page">
    <div class="am-u-lg-12 am-u-sm-12">
        <main class="links-list page-panel">
            <header class="page-section-header">
                <span class="page-kicker">Links</span>
                <h2>常用资源</h2>
                <p>整理一些开发、学习和资料下载入口，方便快速访问。</p>
            </header>
            <th:block th:unless="${#lists.isEmpty(favoriteLinks)}">
                <section class="link-group">
                    <div class="link-group-header">
                        <h3>前端</h3>
                    </div>
                    <ul class="link-grid">
                        <th:block th:each="favoriteLink : ${favoriteLinks}">
                            <li class="link-card">
                                <a target="_blank" th:href="@{${favoriteLink.linkUrl}}">
                                    <span class="link-name" th:text="${favoriteLink.linkName}">前端</span>
                                    <span class="link-desc" th:text="${favoriteLink.linkDescription}">前端资源</span>
                                </a>
                            </li>
                        </th:block>
                    </ul>
                </section>
            </th:block>
            <th:block th:unless="${#lists.isEmpty(recommendLinks)}">
                <section class="link-group">
                    <div class="link-group-header">
                        <h3>后端</h3>
                    </div>
                    <ul class="link-grid">
                        <th:block th:each="recommendLink : ${recommendLinks}">
                            <li class="link-card">
                                <a target="_blank" th:href="@{${recommendLink.linkUrl}}">
                                    <span class="link-name" th:text="${recommendLink.linkName}">后端</span>
                                    <span class="link-desc" th:text="${recommendLink.linkDescription}">后端资源</span>
                                </a>
                            </li>
                        </th:block>
                    </ul>
                </section>
            </th:block>
            <th:block th:unless="${#lists.isEmpty(personalLinks)}">
                <section class="link-group">
                    <div class="link-group-header">
                        <h3>资料下载</h3>
                    </div>
                    <ul class="link-grid">
                        <th:block th:each="personalLink : ${personalLinks}">
                            <li class="link-card">
                                <a target="_blank" th:href="@{${personalLink.linkUrl}}">
                                    <span class="link-name" th:text="${personalLink.linkName}">资料下载</span>
                                    <span class="link-desc" th:text="${personalLink.linkDescription}">资料下载</span>
                                </a>
                            </li>
                        </th:block>
                    </ul>
                </section>
            </th:block>
            <th:block th:unless="${#lists.isEmpty(poetryLinks)}">
                <section class="link-group">
                    <div class="link-group-header">
                        <h3>诗词</h3>
                    </div>
                    <ul class="link-grid">
                        <th:block th:each="poetryLink : ${poetryLinks}">
                            <li class="link-card">
                                <a target="_blank" th:href="@{${poetryLink.linkUrl}}">
                                    <span class="link-name" th:text="${poetryLink.linkName}">诗词</span>
                                    <span class="link-desc" th:text="${poetryLink.linkDescription}">诗词资源</span>
                                </a>
                            </li>
                        </th:block>
                    </ul>
                </section>
            </th:block>
        </main>
    </div>
</div>
<!-- 引入页脚footer-fragment -->
<footer th:replace="blog/amaze/footer::footer-fragment"></footer>
</body>
</html>
